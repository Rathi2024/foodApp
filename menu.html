<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Food Menu</h1>
    </header>
    <section>
        <div class="card">
            <img src="burger.jpg" alt="Close-up of a served burger with a sesame seed bun and visible toppings such as lettuce and melted cheese on a white plate on a wooden table; card caption below reads Burger and ₹149; appetizing and casual" width="200">
            <h2>Burger</h2>
            <p>₹149</p>
            <button onclick="addToCart('Burger')">Add to Cart</button>
        </div>
        <div class="card">
            <img src="pizza.jpg" alt="Close-up of a pizza with melted cheese and tomato toppings, one slice slightly separated on a wooden board; card caption below reads Pizza and ₹299; warm and inviting" width="200">
            <h2>Pizza</h2>
            <p>₹299</p>
            <button onclick="addToCart('Pizza')">Add to Cart</button>
        </div>
    </section>
</body>
</html>
